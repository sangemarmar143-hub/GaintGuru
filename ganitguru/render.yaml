services:
  - type: web
    name: ganitguru-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # Set this manually in the Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false          # Set to your Vercel frontend URL, e.g. https://ganitguru.vercel.app
      - key: PORT
        value: 4000
